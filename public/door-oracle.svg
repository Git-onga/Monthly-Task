<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="or-bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="55%" stop-color="#0e0c00"/>
      <stop offset="100%" stop-color="#060400"/>
    </radialGradient>
    <radialGradient id="or-sun" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="or-glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="or-blur"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="400" height="560" fill="url(#or-bg)"/>
  <ellipse cx="200" cy="0" rx="200" ry="120" fill="url(#or-sun)" filter="url(#or-blur)"/>
  <!-- Sand floor -->
  <path d="M0,498 Q100,488 200,494 Q300,500 400,490 L400,560 L0,560 Z" fill="#1a1200" opacity="0.8"/>
  <!-- Obelisks -->
  <g fill="#121000" stroke="#3a2e00" stroke-width="1.5" opacity="0.7">
    <path d="M28,490 L35,180 L42,490 Z"/>
    <path d="M355,490 L362,185 L369,490 Z"/>
    <path d="M33,180 L37,160 L41,180 Z" fill="#3a2e00"/>
    <path d="M360,185 L364,165 L368,185 Z" fill="#3a2e00"/>
  </g>
  <!-- Hieroglyphs on obelisks -->
  <g fill="#3a2e00" font-size="9" font-family="serif" text-anchor="middle" opacity="0.6">
    <text x="35" y="220">𓂀</text><text x="35" y="240">𓋴</text>
    <text x="35" y="260">𓇳</text><text x="35" y="280">𓅓</text>
    <text x="363" y="225">𓃭</text><text x="363" y="245">𓆣</text>
    <text x="363" y="265">𓂋</text><text x="363" y="285">𓅱</text>
  </g>
  <!-- Door frame — polished sandstone -->
  <path d="M74,490 L74,172 Q74,92 200,92 Q326,92 326,172 L326,490 Z" fill="#120e00" stroke="#6a5a00" stroke-width="3"/>
  <path d="M62,490 L62,168 Q62,76 200,76 Q338,76 338,168 L338,490" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.55"/>
  <!-- Solar disc in arch -->
  <path d="M74,172 Q74,92 200,92 Q326,92 326,172 Z" fill="#1a1600"/>
  <circle cx="200" cy="140" r="30" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6" filter="url(#or-glow)"/>
  <circle cx="200" cy="140" r="18" fill="#1a1400" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="140" r="8"  fill="#d4af37" opacity="0.7" filter="url(or-glow)"/>
  <!-- Sun rays -->
  <g stroke="#d4af37" stroke-width="1" opacity="0.35" filter="url(#or-glow)">
    <line x1="200" y1="104" x2="200" y2="95"/>
    <line x1="200" y1="176" x2="200" y2="185"/>
    <line x1="162" y1="140" x2="152" y2="140"/>
    <line x1="238" y1="140" x2="248" y2="140"/>
    <line x1="173" y1="113" x2="166" y2="106"/>
    <line x1="227" y1="113" x2="234" y2="106"/>
    <line x1="173" y1="167" x2="166" y2="174"/>
    <line x1="227" y1="167" x2="234" y2="174"/>
  </g>
  <!-- Door surface — papyrus gold -->
  <rect x="74" y="172" width="252" height="318" rx="2" fill="#160e00"/>
  <!-- Carved relief panels -->
  <g fill="none" stroke="#6a5200" stroke-width="1" opacity="0.5">
    <rect x="84"  y="185" width="108" height="140" rx="4"/>
    <rect x="208" y="185" width="108" height="140" rx="4"/>
    <rect x="84"  y="340" width="108" height="120" rx="4"/>
    <rect x="208" y="340" width="108" height="120" rx="4"/>
  </g>
  <!-- Figures in panels -->
  <g transform="translate(138,255)" filter="url(#or-glow)" opacity="0.6">
    <!-- Pharaoh figure -->
    <line x1="0" y1="-50" x2="0" y2="20" stroke="#d4af37" stroke-width="1.5"/>
    <circle cx="0" cy="-55" r="8" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Headdress -->
    <path d="M-8,-47 L-12,-30 M8,-47 L12,-30" stroke="#d4af37" stroke-width="1"/>
    <!-- Arms offering -->
    <line x1="0" y1="-30" x2="-20" y2="-20" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="20" y2="-20" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="0" y1="20" x2="-10" y2="45" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="10"  y2="45" stroke="#d4af37" stroke-width="1.5"/>
  </g>
  <g transform="translate(262,255)" filter="url(#or-glow)" opacity="0.6">
    <!-- Anubis figure -->
    <line x1="0" y1="-45" x2="0" y2="20" stroke="#d4af37" stroke-width="1.5"/>
    <circle cx="0" cy="-52" r="8" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Jackal ears -->
    <path d="M-8,-48 L-12,-62 M8,-48 L12,-62" stroke="#d4af37" stroke-width="1.5"/>
    <!-- Staff -->
    <line x1="-18" y1="-38" x2="-18" y2="45" stroke="#d4af37" stroke-width="1.5"/>
    <path d="M-22,-38 Q-18,-50 -14,-38" fill="none" stroke="#d4af37" stroke-width="1"/>
  </g>
  <!-- Cartouche in lower panels -->
  <g transform="translate(138,400)" filter="url(#or-glow)" opacity="0.5">
    <rect x="-28" y="-18" width="56" height="36" rx="18" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <text x="0" y="7" font-size="14" font-family="serif" fill="#d4af37" text-anchor="middle">𓂀𓋴𓇳</text>
  </g>
  <g transform="translate(262,400)" filter="url(#or-glow)" opacity="0.5">
    <rect x="-28" y="-18" width="56" height="36" rx="18" fill="none" stroke="#d4af37" stroke-width="1.5"/>
    <text x="0" y="7" font-size="14" font-family="serif" fill="#d4af37" text-anchor="middle">𓅓𓃭𓅱</text>
  </g>
  <!-- Handle — ankh -->
  <g transform="translate(200,447)" filter="url(#or-glow)">
    <circle r="12" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="12" x2="0" y2="30" stroke="#d4af37" stroke-width="2.5"/>
    <line x1="-14" y1="22" x2="14" y2="22" stroke="#d4af37" stroke-width="2"/>
    <circle r="4" fill="#d4af37" opacity="0.7"/>
  </g>
  <!-- Keystone -->
  <path d="M186,92 L200,75 L214,92 Z" fill="#1a1600" stroke="#d4af37" stroke-width="1.5"/>
  <circle cx="200" cy="70" r="7" fill="#d4af37" opacity="0.7" filter="url(#or-glow)"/>
</svg>
