<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="geo-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#061828"/>
      <stop offset="60%" stop-color="#030e18"/>
      <stop offset="100%" stop-color="#010810"/>
    </radialGradient>
    <radialGradient id="geo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="0"/>
    </radialGradient>
    <filter id="geo-glow-f">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="geo-blur"><feGaussianBlur stdDeviation="5"/></filter>
    <pattern id="geo-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30,0 L0,0 0,30" fill="none" stroke="#1a3a5a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#geo-bg)"/>
  <!-- Grid overlay -->
  <rect width="400" height="560" fill="url(#geo-grid)"/>

  <!-- Central glow -->
  <ellipse cx="200" cy="310" rx="160" ry="130" fill="url(#geo-glow)" filter="url(#geo-blur)"/>

  <!-- Compass rose at top bg -->
  <g transform="translate(200,90)" opacity="0.12" fill="none" stroke="#3498db" stroke-width="1">
    <circle r="50"/>
    <circle r="35"/>
    <line x1="0" y1="-55" x2="0" y2="55"/>
    <line x1="-55" y1="0" x2="55" y2="0"/>
    <line x1="-39" y1="-39" x2="39" y2="39"/>
    <line x1="39" y1="-39" x2="-39" y2="39"/>
  </g>

  <!-- Door frame — brass/bronze nautical style -->
  <path d="M72,490 L72,170 Q72,90 200,90 Q328,90 328,170 L328,490 Z"
        fill="#040e1c" stroke="#1a4a7a" stroke-width="3"/>
  <!-- Outer brass frame -->
  <path d="M62,490 L62,167 Q62,78 200,78 Q338,78 338,167 L338,490"
        fill="none" stroke="#2a6aaa" stroke-width="3.5"/>
  <!-- Inner thin line -->
  <path d="M72,490 L72,170 Q72,90 200,90 Q328,90 328,170 L328,490"
        fill="none" stroke="#0a2a4a" stroke-width="1.5"/>

  <!-- Corner bracket ornaments -->
  <g fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.6">
    <path d="M62,340 L52,340 L52,300"/>
    <path d="M62,360 L52,360 L52,400"/>
    <path d="M338,340 L348,340 L348,300"/>
    <path d="M338,360 L348,360 L348,400"/>
  </g>

  <!-- Door surface — dark blue map parchment -->
  <rect x="72" y="170" width="256" height="320" rx="2" fill="#061422"/>

  <!-- Map lines etched into door -->
  <g fill="none" stroke="#1a4a7a" stroke-width="0.8" opacity="0.55">
    <!-- Latitude lines -->
    <line x1="72" y1="200" x2="328" y2="200"/>
    <line x1="72" y1="230" x2="328" y2="230"/>
    <line x1="72" y1="260" x2="328" y2="260"/>
    <line x1="72" y1="290" x2="328" y2="290"/>
    <line x1="72" y1="320" x2="328" y2="320"/>
    <line x1="72" y1="350" x2="328" y2="350"/>
    <line x1="72" y1="380" x2="328" y2="380"/>
    <line x1="72" y1="410" x2="328" y2="410"/>
    <line x1="72" y1="440" x2="328" y2="440"/>
    <line x1="72" y1="470" x2="328" y2="470"/>
    <!-- Longitude lines -->
    <line x1="112" y1="170" x2="112" y2="490"/>
    <line x1="152" y1="170" x2="152" y2="490"/>
    <line x1="192" y1="170" x2="192" y2="490"/>
    <line x1="232" y1="170" x2="232" y2="490"/>
    <line x1="272" y1="170" x2="272" y2="490"/>
    <line x1="312" y1="170" x2="312" y2="490"/>
  </g>

  <!-- Arch fill with map grid -->
  <path d="M72,170 Q72,90 200,90 Q328,90 328,170 Z" fill="#061422"/>
  <g fill="none" stroke="#1a4a7a" stroke-width="0.6" opacity="0.3">
    <line x1="72"  y1="170" x2="328" y2="170"/>
    <line x1="82"  y1="155" x2="318" y2="155"/>
    <line x1="100" y1="135" x2="300" y2="135"/>
    <line x1="130" y1="112" x2="270" y2="112"/>
  </g>

  <!-- Triangulation lines (sacred geometry) -->
  <g fill="none" stroke="#3498db" stroke-width="1.2" opacity="0.4" filter="url(#geo-glow-f)">
    <polygon points="200,190 130,330 270,330"/>
    <polygon points="200,340 140,220 260,220"/>
    <!-- Circles -->
    <circle cx="200" cy="280" r="70"/>
    <circle cx="200" cy="280" r="45"/>
  </g>

  <!-- Ptolemy's world map outline (stylised oikoumene) -->
  <g transform="translate(200,285)" fill="none" stroke="#3498db" stroke-width="1.5"
     opacity="0.7" filter="url(#geo-glow-f)">
    <!-- Simplified world blob -->
    <path d="M-60,-40 Q-70,-20 -65,10 Q-55,40 -20,50 Q20,58 50,40 Q75,20 70,-10 Q65,-40 40,-50 Q10,-62 -30,-55 Z"/>
    <!-- Mediterranean sea shape -->
    <path d="M-40,-10 Q-20,-20 0,-15 Q20,-20 35,-8 Q20,-5 5,-2 Q-15,0 -40,-10 Z" opacity="0.5"/>
    <!-- Wind rose in centre -->
    <circle r="8"/>
    <line x1="0" y1="-14" x2="0" y2="14"/>
    <line x1="-14" y1="0" x2="14" y2="0"/>
    <line x1="-10" y1="-10" x2="10" y2="10"/>
    <line x1="10" y1="-10" x2="-10" y2="10"/>
  </g>

  <!-- Horizontal panel line -->
  <line x1="72" y1="355" x2="328" y2="355" stroke="#1a4a7a" stroke-width="2" opacity="0.6"/>

  <!-- Door handle — brass ship's wheel -->
  <g transform="translate(200,432)" filter="url(#geo-glow-f)">
    <circle r="22" fill="none" stroke="#3498db" stroke-width="2" opacity="0.7"/>
    <circle r="14" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.6"/>
    <circle r="6"  fill="#1a4a7a" stroke="#3498db" stroke-width="1.5"/>
    <circle r="2.5" fill="#3498db"/>
    <!-- Spokes -->
    <g stroke="#3498db" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-22" x2="0" y2="-14"/>
      <line x1="0" y1="14"  x2="0" y2="22"/>
      <line x1="-22" y1="0" x2="-14" y2="0"/>
      <line x1="14"  y1="0" x2="22"  y2="0"/>
      <line x1="-16" y1="-16" x2="-10" y2="-10"/>
      <line x1="10"  y1="10"  x2="16"  y2="16"/>
      <line x1="16"  y1="-16" x2="10"  y2="-10"/>
      <line x1="-10" y1="10"  x2="-16" y2="16"/>
    </g>
  </g>

  <!-- Keystone -->
  <path d="M186,90 L200,74 L214,90 Z" fill="#0a2a4a" stroke="#3498db" stroke-width="1.5"/>
  <circle cx="200" cy="70" r="7" fill="#3498db" opacity="0.7" filter="url(#geo-glow-f)"/>

  <!-- Corner stars / degree marks -->
  <g fill="#3498db" opacity="0.5">
    <circle cx="72"  cy="170" r="3"/>
    <circle cx="328" cy="170" r="3"/>
    <circle cx="72"  cy="490" r="3"/>
    <circle cx="328" cy="490" r="3"/>
  </g>

  <!-- Measurement tick marks along sides -->
  <g stroke="#3498db" stroke-width="1" opacity="0.3">
    <line x1="62" y1="200" x2="68" y2="200"/>
    <line x1="62" y1="250" x2="68" y2="250"/>
    <line x1="62" y1="300" x2="68" y2="300"/>
    <line x1="62" y1="350" x2="68" y2="350"/>
    <line x1="62" y1="400" x2="68" y2="400"/>
    <line x1="62" y1="450" x2="68" y2="450"/>
    <line x1="332" y1="200" x2="338" y2="200"/>
    <line x1="332" y1="250" x2="338" y2="250"/>
    <line x1="332" y1="300" x2="338" y2="300"/>
    <line x1="332" y1="350" x2="338" y2="350"/>
    <line x1="332" y1="400" x2="338" y2="400"/>
    <line x1="332" y1="450" x2="338" y2="450"/>
  </g>
</svg>
