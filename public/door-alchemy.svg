<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="alc-bg" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#0a2a10"/>
      <stop offset="60%" stop-color="#051a08"/>
      <stop offset="100%" stop-color="#020d04"/>
    </radialGradient>
    <radialGradient id="alc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="alc-flask" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a8f0c0"/>
      <stop offset="50%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#0a5a28"/>
    </radialGradient>
    <filter id="alc-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="alc-glow-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#alc-bg)"/>

  <!-- Ambient glow at bottom -->
  <ellipse cx="200" cy="480" rx="180" ry="80" fill="url(#alc-glow)" filter="url(#alc-blur)"/>

  <!-- Stone floor tiles -->
  <g opacity="0.3" fill="none" stroke="#1a4a22" stroke-width="1">
    <line x1="0" y1="490" x2="400" y2="490"/>
    <line x1="0" y1="520" x2="400" y2="520"/>
    <line x1="0" y1="550" x2="400" y2="550"/>
    <line x1="80" y1="490" x2="80" y2="560"/>
    <line x1="160" y1="490" x2="160" y2="560"/>
    <line x1="240" y1="490" x2="240" y2="560"/>
    <line x1="320" y1="490" x2="320" y2="560"/>
  </g>

  <!-- Door frame — heavy stone arch -->
  <path d="M70,480 L70,160 Q70,80 200,80 Q330,80 330,160 L330,480 Z"
        fill="#0d2a0f" stroke="#1a5a20" stroke-width="3"/>
  <!-- Frame outer -->
  <path d="M58,480 L58,155 Q58,62 200,62 Q342,62 342,155 L342,480"
        fill="none" stroke="#2a6a2a" stroke-width="4"/>
  <!-- Frame bevel -->
  <path d="M64,480 L64,157 Q64,70 200,70 Q336,70 336,157 L336,480"
        fill="none" stroke="#0a3a10" stroke-width="2"/>

  <!-- Stone blocks on frame -->
  <g fill="none" stroke="#1a4a1a" stroke-width="1" opacity="0.6">
    <rect x="58" y="300" width="12" height="35"/>
    <rect x="58" y="340" width="12" height="35"/>
    <rect x="58" y="380" width="12" height="35"/>
    <rect x="58" y="420" width="12" height="35"/>
    <rect x="330" y="300" width="12" height="35"/>
    <rect x="330" y="340" width="12" height="35"/>
    <rect x="330" y="380" width="12" height="35"/>
    <rect x="330" y="420" width="12" height="35"/>
  </g>

  <!-- Door wood planks — dark green stained -->
  <rect x="70" y="160" width="260" height="320" rx="2" fill="#0f3515"/>
  <g fill="#0a2a10" stroke="#0d3010" stroke-width="1">
    <rect x="70" y="180" width="260" height="8" rx="1" opacity="0.7"/>
    <rect x="70" y="220" width="260" height="8" rx="1" opacity="0.6"/>
    <rect x="70" y="260" width="260" height="8" rx="1" opacity="0.7"/>
    <rect x="70" y="300" width="260" height="8" rx="1" opacity="0.5"/>
    <rect x="70" y="340" width="260" height="8" rx="1" opacity="0.7"/>
    <rect x="70" y="380" width="260" height="8" rx="1" opacity="0.6"/>
    <rect x="70" y="420" width="260" height="8" rx="1" opacity="0.7"/>
    <rect x="70" y="460" width="260" height="8" rx="1" opacity="0.5"/>
  </g>
  <!-- Vertical plank divider -->
  <rect x="196" y="160" width="8" height="320" fill="#0a2a10" opacity="0.6"/>

  <!-- Arch fill — glowing portal within arch -->
  <path d="M70,160 Q70,80 200,80 Q330,80 330,160 Z" fill="#0f3515"/>
  <!-- Inner arch glow -->
  <path d="M82,163 Q82,92 200,92 Q318,92 318,163 Z"
        fill="#1a5a20" opacity="0.5"/>
  <path d="M95,166 Q95,104 200,104 Q305,104 305,166 Z"
        fill="#2ecc71" opacity="0.12" filter="url(#alc-blur)"/>

  <!-- Alchemical symbol on door — the triangle of earth -->
  <g transform="translate(200,310)" filter="url(#alc-glow-filter)">
    <!-- Outer circle -->
    <circle r="55" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
    <!-- Triangle pointing down (earth) -->
    <polygon points="0,-38 33,19 -33,19" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.8"/>
    <!-- Bar through triangle (earth symbol) -->
    <line x1="-22" y1="8" x2="22" y2="8" stroke="#2ecc71" stroke-width="2" opacity="0.9"/>
    <!-- Center dot -->
    <circle r="4" fill="#2ecc71" opacity="0.9"/>
    <!-- Outer petals / runes -->
    <g opacity="0.4" fill="none" stroke="#2ecc71" stroke-width="1">
      <line x1="0" y1="-60" x2="0" y2="-50"/>
      <line x1="52" y1="30" x2="43" y2="25"/>
      <line x1="-52" y1="30" x2="-43" y2="25"/>
    </g>
  </g>

  <!-- Flask / alembic on left panel -->
  <g transform="translate(115,340)" opacity="0.7" filter="url(#alc-glow-filter)">
    <ellipse cx="0" cy="22" rx="22" ry="14" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <rect x="-8" y="-20" width="16" height="42" rx="4" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <ellipse cx="0" cy="-22" rx="10" ry="8" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <line x1="0" y1="-30" x2="0" y2="-42" stroke="#2ecc71" stroke-width="1.5"/>
    <!-- Bubbles -->
    <circle cx="-4" cy="10" r="2.5" fill="#2ecc71" opacity="0.5"/>
    <circle cx="5"  cy="2"  r="1.5" fill="#2ecc71" opacity="0.4"/>
    <circle cx="-2" cy="-5" r="2"   fill="#2ecc71" opacity="0.3"/>
  </g>

  <!-- Flask / alembic on right panel -->
  <g transform="translate(285,340)" opacity="0.7" filter="url(#alc-glow-filter)">
    <ellipse cx="0" cy="22" rx="22" ry="14" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <rect x="-8" y="-20" width="16" height="42" rx="4" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <ellipse cx="0" cy="-22" rx="10" ry="8" fill="#0a4a18" stroke="#2ecc71" stroke-width="1.2"/>
    <line x1="0" y1="-30" x2="0" y2="-42" stroke="#2ecc71" stroke-width="1.5"/>
    <circle cx="4"  cy="10" r="2.5" fill="#2ecc71" opacity="0.5"/>
    <circle cx="-5" cy="2"  r="1.5" fill="#2ecc71" opacity="0.4"/>
  </g>

  <!-- Door knocker / handle -->
  <g transform="translate(200,440)">
    <circle r="12" fill="#1a5a20" stroke="#2ecc71" stroke-width="2"/>
    <circle r="6"  fill="#2ecc71" opacity="0.8"/>
  </g>

  <!-- Green mist seeping under door -->
  <ellipse cx="200" cy="480" rx="130" ry="12" fill="#2ecc71" opacity="0.08" filter="url(#alc-blur)"/>
  <ellipse cx="200" cy="483" rx="90"  ry="8"  fill="#2ecc71" opacity="0.06" filter="url(#alc-blur)"/>

  <!-- Top keystone -->
  <path d="M185,62 L200,48 L215,62 Z" fill="#1a5a20" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="200" cy="44" r="6" fill="#2ecc71" opacity="0.7"/>

  <!-- Vines creeping along arch -->
  <g fill="none" stroke="#1a6a20" stroke-width="1.5" opacity="0.45">
    <path d="M58,300 Q48,280 55,260 Q48,240 58,220"/>
    <path d="M55,260 Q65,255 60,245"/>
    <path d="M52,290 Q44,285 48,275"/>
    <path d="M342,320 Q352,300 345,278 Q354,255 342,235"/>
    <path d="M345,278 Q335,272 340,262"/>
  </g>
</svg>
