<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <radialGradient id="spr-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#180828"/>
      <stop offset="55%" stop-color="#0e0418"/>
      <stop offset="100%" stop-color="#06020e"/>
    </radialGradient>
    <radialGradient id="spr-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c39af0" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#9b59b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spr-portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0a3a" stop-opacity="1"/>
      <stop offset="60%" stop-color="#180428" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0e0218" stop-opacity="1"/>
    </radialGradient>
    <filter id="spr-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="spr-blur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="spr-soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#spr-bg)"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="42"  cy="30"  r="1"   opacity="0.6"/>
    <circle cx="120" cy="55"  r="1.5" opacity="0.4"/>
    <circle cx="280" cy="25"  r="1"   opacity="0.7"/>
    <circle cx="355" cy="70"  r="1.2" opacity="0.5"/>
    <circle cx="30"  cy="140" r="0.8" opacity="0.5"/>
    <circle cx="370" cy="180" r="1"   opacity="0.4"/>
    <circle cx="90"  cy="400" r="1"   opacity="0.3"/>
    <circle cx="340" cy="420" r="0.8" opacity="0.4"/>
    <circle cx="180" cy="50"  r="1"   opacity="0.5"/>
    <circle cx="310" cy="130" r="1.2" opacity="0.3"/>
  </g>

  <!-- Misty ground -->
  <ellipse cx="200" cy="520" rx="220" ry="50" fill="#9b59b6" opacity="0.06" filter="url(#spr-blur)"/>
  <ellipse cx="200" cy="510" rx="160" ry="35" fill="#9b59b6" opacity="0.05" filter="url(#spr-blur)"/>

  <!-- Egyptian obelisk shadows left -->
  <path d="M30,490 L38,200 L46,490 Z" fill="#120418" opacity="0.7"/>
  <path d="M350,490 L358,200 L366,490 Z" fill="#120418" opacity="0.7"/>

  <!-- Door frame — black obsidian with violet glow -->
  <path d="M75,490 L75,168 Q75,88 200,88 Q325,88 325,168 L325,490 Z"
        fill="#100220" stroke="#4a1a6a" stroke-width="3"/>
  <!-- Outer violet glow frame -->
  <path d="M64,490 L64,164 Q64,74 200,74 Q336,74 336,164 L336,490"
        fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.6"/>
  <!-- Inner frame -->
  <path d="M75,490 L75,168 Q75,88 200,88 Q325,88 325,168 L325,490"
        fill="none" stroke="#2a0a3a" stroke-width="2"/>

  <!-- Eye of Horus carved above arch -->
  <g transform="translate(200,52)" filter="url(#spr-glow)" opacity="0.8">
    <!-- Eye outline -->
    <path d="M-28,0 Q0,-22 28,0 Q0,22 -28,0 Z"
          fill="#1a0428" stroke="#9b59b6" stroke-width="1.5"/>
    <!-- Pupil -->
    <circle r="10" fill="#1a0428" stroke="#9b59b6" stroke-width="1.5"/>
    <circle r="5"  fill="#9b59b6" opacity="0.8"/>
    <circle r="2"  fill="#c39af0"/>
    <!-- Tears / markings of Horus -->
    <path d="M10,8 Q14,18 8,24"  fill="none" stroke="#9b59b6" stroke-width="1.5"/>
    <path d="M10,14 L16,22"      fill="none" stroke="#9b59b6" stroke-width="1"/>
  </g>

  <!-- Portal circle in arch -->
  <ellipse cx="200" cy="165" rx="78" ry="55"
           fill="url(#spr-portal)" filter="url(#spr-soft)"/>
  <ellipse cx="200" cy="165" rx="78" ry="55"
           fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.5"/>
  <!-- Swirling lines inside portal -->
  <g transform="translate(200,165)" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.35">
    <ellipse rx="55" ry="38" transform="rotate(15)"/>
    <ellipse rx="40" ry="28" transform="rotate(-10)"/>
    <ellipse rx="25" ry="18" transform="rotate(25)"/>
    <circle r="10"/>
    <circle r="4" fill="#9b59b6" opacity="0.4"/>
  </g>

  <!-- Door surface — near-black obsidian -->
  <rect x="75" y="168" width="250" height="322" rx="2" fill="#0e0218"/>

  <!-- Hieroglyph columns carved into door -->
  <g fill="none" stroke="#4a1a6a" stroke-width="1" opacity="0.5">
    <!-- Left column of glyphs -->
    <rect x="85"  y="185" width="20" height="20" rx="3"/>
    <rect x="85"  y="215" width="20" height="20" rx="3"/>
    <rect x="85"  y="245" width="20" height="20" rx="3"/>
    <rect x="85"  y="275" width="20" height="20" rx="3"/>
    <rect x="85"  y="305" width="20" height="20" rx="3"/>
    <rect x="85"  y="335" width="20" height="20" rx="3"/>
    <rect x="85"  y="365" width="20" height="20" rx="3"/>
    <!-- Right column of glyphs -->
    <rect x="295" y="185" width="20" height="20" rx="3"/>
    <rect x="295" y="215" width="20" height="20" rx="3"/>
    <rect x="295" y="245" width="20" height="20" rx="3"/>
    <rect x="295" y="275" width="20" height="20" rx="3"/>
    <rect x="295" y="305" width="20" height="20" rx="3"/>
    <rect x="295" y="335" width="20" height="20" rx="3"/>
    <rect x="295" y="365" width="20" height="20" rx="3"/>
    <!-- Central glyph divider -->
    <line x1="200" y1="185" x2="200" y2="490"/>
  </g>
  <!-- Small glyph symbols -->
  <g fill="#6a2a9a" font-size="10" font-family="serif" text-anchor="middle" opacity="0.6">
    <text x="95"  y="200">𓂀</text>
    <text x="95"  y="230">𓋴</text>
    <text x="95"  y="260">𓃭</text>
    <text x="95"  y="290">𓇳</text>
    <text x="305" y="200">𓅓</text>
    <text x="305" y="230">𓆣</text>
    <text x="305" y="260">𓂋</text>
    <text x="305" y="290">𓅱</text>
  </g>

  <!-- Large Ankh carved in centre -->
  <g transform="translate(200,340)" filter="url(#spr-glow)" opacity="0.7">
    <circle r="28" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <!-- Cross stem -->
    <line x1="0" y1="28" x2="0" y2="80" stroke="#9b59b6" stroke-width="3"/>
    <!-- Cross arms -->
    <line x1="-30" y1="55" x2="30" y2="55" stroke="#9b59b6" stroke-width="3"/>
    <!-- Inner loop detail -->
    <circle r="18" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Floating spirits / wisps -->
  <g filter="url(#spr-glow)" opacity="0.45">
    <ellipse cx="120" cy="250" rx="8"  ry="14" fill="#9b59b6" transform="rotate(-15,120,250)"/>
    <ellipse cx="120" cy="250" rx="4"  ry="8"  fill="#c39af0" transform="rotate(-15,120,250)"/>
    <ellipse cx="285" cy="280" rx="7"  ry="12" fill="#9b59b6" transform="rotate(10,285,280)"/>
    <ellipse cx="285" cy="280" rx="3"  ry="7"  fill="#c39af0" transform="rotate(10,285,280)"/>
    <ellipse cx="150" cy="430" rx="6"  ry="10" fill="#9b59b6" transform="rotate(-5,150,430)"/>
    <ellipse cx="255" cy="410" rx="5"  ry="9"  fill="#9b59b6" transform="rotate(8,255,410)"/>
  </g>

  <!-- Door handle — orb -->
  <g transform="translate(200,455)" filter="url(#spr-glow)">
    <circle r="16" fill="url(#spr-orb)"/>
    <circle r="9"  fill="#2a0a3a" stroke="#9b59b6" stroke-width="1.5"/>
    <circle r="4"  fill="#c39af0" opacity="0.9"/>
  </g>

  <!-- Top arch fill -->
  <path d="M75,168 Q75,88 200,88 Q325,88 325,168 Z"
        fill="#0e0218" opacity="0.9"/>
  <!-- Arch glow -->
  <path d="M90,168 Q90,103 200,103 Q310,103 310,168 Z"
        fill="#9b59b6" opacity="0.06" filter="url(#spr-blur)"/>

  <!-- Keystone violet eye -->
  <path d="M186,88 L200,72 L214,88 Z" fill="#1a0428" stroke="#9b59b6" stroke-width="1.5"/>
  <circle cx="200" cy="68" r="7" fill="#9b59b6" opacity="0.7" filter="url(#spr-glow)"/>
</svg>
